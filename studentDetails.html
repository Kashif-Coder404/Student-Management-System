<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="buttonStyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <aside class="sidebar">
        <div class="aside-inner-cont">
          <ul>
            <li class="sideLink active" id="dashboard">
              <a href="index.html"
                ><i class="fa-solid fa-table-columns"></i> Dashboard</a
              >
            </li>
            <li class="sideLink" id="addStudent">
              <a href="addStudent.html"
                ><i class="fa-solid fa-user-plus"></i> Add Student</a
              >
            </li>
            <li class="sideLink" id="viewStudent">
              <a href="students.html"
                ><i class="fa-solid fa-users"></i> View Students</a
              >
            </li>
            <li class="sideLink" id="delStudent">
              <a href="delStudent.html"
                ><i class="fa-solid fa-trash-can"></i> Delete Students</a
              >
            </li>
          </ul>
        </div>
      </aside>
      <main class="main-content">
        <div class="student-card">
          <div class="student-header">
            <h1><i class="fa-regular fa-id-card"></i> Student Profile</h1>
            <p>Detailed information</p>
          </div>

          <div class="student-grid">
            <div class="detail-item">
              <span class="label"
                ><i class="fa-regular fa-user"></i> Full Name</span
              >
              <span class="value" id="name">—</span>
            </div>

            <div class="detail-item">
              <span class="label"
                ><i class="fa-solid fa-hashtag"></i> Roll Number</span
              >
              <span class="value" id="rollNo">—</span>
            </div>

            <div class="detail-item">
              <span class="label"><i class="fa-solid fa-book"></i> Course</span>
              <span class="value" id="course">—</span>
            </div>

            <div class="detail-item">
              <span class="label"
                ><i class="fa-regular fa-envelope"></i> Email</span
              >
              <span class="value" id="email">—</span>
            </div>

            <div class="detail-item full-width">
              <span class="label"
                ><i class="fa-solid fa-location-dot"></i> Address</span
              >
              <span class="value" id="address">—</span>
            </div>

            <div class="detail-item">
              <span class="label"
                ><i class="fa-solid fa-venus-mars"></i> Gender</span
              >
              <span class="value" id="gender">—</span>
            </div>

            <div class="detail-item">
              <span class="label"><i class="fa-solid fa-phone"></i> Phone</span>
              <span class="value" id="phone">—</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
  <script src="js/global.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const rollNo = params.get("rollNo");

    if (rollNo) {
      stDet(rollNo);
    }
  </script>
</html>

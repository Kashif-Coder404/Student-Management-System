<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Message</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <aside class="sidebar">
        <div class="aside-inner-cont">
          <ul>
            <li class="sideLink active" id="dashboard">
              <a href="index.html"
                ><i class="fa-solid fa-table-columns"></i> Dashboard</a
              >
            </li>
            <li class="sideLink" id="addStudent">
              <a href="addStudent.html"
                ><i class="fa-solid fa-user-plus"></i> Add Student</a
              >
            </li>
            <li class="sideLink" id="viewStudent">
              <a href="students.html"
                ><i class="fa-solid fa-users"></i> View Students</a
              >
            </li>
            <li class="sideLink" id="delStudent">
              <a href="delStudent.html"
                ><i class="fa-solid fa-trash-can"></i> Delete Students</a
              >
            </li>
          </ul>
        </div>
      </aside>
      <main
        class="main-content"
        style="
          width: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
        "
      >
        <div class="message-box">
          <h1 id="msgTitle">
            <i class="fa-solid fa-circle-check"></i> Success
          </h1>
          <p id="msgText"></p>

          <div class="form-buttons">
            <a href="addStudent.html" class="btn"
              ><i class="fa-solid fa-user-plus"></i> Add Another Student</a
            >
            <a href="students.html" class="btn secondary-btn"
              ><i class="fa-solid fa-users"></i> View Students</a
            >
          </div>
        </div>
      </main>
    </div>
    <script src="js/global.js"></script>

    <script>
      // Read message from URL
      const params = new URLSearchParams(window.location.search);
      const status = params.get("status");
      const msg = params.get("msg");
      console.log(msg);

      const title = document.getElementById("msgTitle");
      const text = document.getElementById("msgText");
      text.innerText = msg;

      if (status === "error") {
        // Updated JS to inject an error icon instead of just text
        title.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Error';
        title.style.color = "red";
      }
    </script>
  </body>
</html>

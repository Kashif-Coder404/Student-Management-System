<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Delete Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <aside class="sidebar">
        <div class="aside-inner-cont">
          <ul>
            <li class="sideLink active" id="dashboard">
              <a href="index.html"
                ><i class="fa-solid fa-table-columns"></i> Dashboard</a
              >
            </li>
            <li class="sideLink" id="addStudent">
              <a href="addStudent.html"
                ><i class="fa-solid fa-user-plus"></i> Add Student</a
              >
            </li>
            <li class="sideLink" id="viewStudent">
              <a href="students.html"
                ><i class="fa-solid fa-users"></i> View Students</a
              >
            </li>
            <li class="sideLink" id="delStudent">
              <a href="delStudent.html"
                ><i class="fa-solid fa-trash-can"></i> Delete Students</a
              >
            </li>
          </ul>
        </div>
      </aside>
      <main class="main-content delContMain">
        <div class="keyPrCont" id="keyOverlay">
          <div class="keyPrInnerCont form-container">
            <h2 style="margin-bottom: 20px">
              <i class="fa-solid fa-shield-halved"></i> Security Check
            </h2>

            <div class="form-group">
              <label for="authKey"
                ><i class="fa-solid fa-key"></i> Admin Key</label
              >
              <input
                type="password"
                name="authKey"
                id="authKey"
                placeholder="Enter key to proceed"
                required
              />
            </div>
            <h3
              class="keyAlertEL"
              id="keyAlert"
              style="color: red; font-size: 0.9rem"
            ></h3>
            <div class="form-buttons">
              <button id="sendKeybtn" class="btn">
                <i class="fa-solid fa-unlock"></i> Verify Key
              </button>
            </div>
          </div>
        </div>

        <h1><i class="fa-solid fa-user-xmark"></i> Delete Student Record</h1>
        <div class="form-container">
          <form id="delStForm">
            <div class="form-group">
              <label for="stName"
                ><i class="fa-regular fa-user"></i> Student Name</label
              >
              <input
                type="text"
                name="name"
                id="stName"
                autocapitalize="off"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-group">
              <label for="rollNo"
                ><i class="fa-regular fa-id-card"></i> Roll No</label
              >
              <input
                type="text"
                name="rollNo"
                id="rollNo"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-buttons">
              <button type="submit" class="btn delete-btn">
                <i class="fa-solid fa-trash-can"></i> Delete Student
              </button>
              <span id="delAlert" style="color: red"></span>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
  <script src="js/global.js"></script>

  <script type="module" src="js/delStudent.js"></script>
</html>

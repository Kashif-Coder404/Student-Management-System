<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <aside class="sidebar">
        <div class="aside-inner-cont">
          <ul>
            <li class="sideLink active" id="dashboard">
              <a href="index.html"
                ><i class="fa-solid fa-table-columns"></i> Dashboard</a
              >
            </li>
            <li class="sideLink" id="addStudent">
              <a href="addStudent.html"
                ><i class="fa-solid fa-user-plus"></i> Add Student</a
              >
            </li>
            <li class="sideLink" id="viewStudent">
              <a href="students.html"
                ><i class="fa-solid fa-users"></i> View Students</a
              >
            </li>
            <li class="sideLink" id="delStudent">
              <a href="delStudent.html"
                ><i class="fa-solid fa-trash-can"></i> Delete Students</a
              >
            </li>
          </ul>
        </div>
      </aside>
      <main class="main-content">
        <h1 class="addStHead">
          <i class="fa-solid fa-user-plus"></i> Add New Student
        </h1>

        <div class="form-container">
          <form id="addStudentForm">
            <div class="form-group">
              <label for="firstName"
                ><i class="fa-regular fa-user"></i> First Name</label
              >
              <input type="text" name="firstName" id="firstName" required />
            </div>
            <div class="form-group">
              <label
                ><i class="fa-regular fa-address-card"></i> Full Name</label
              >
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label><i class="fa-regular fa-envelope"></i> Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label><i class="fa-solid fa-phone"></i> Phone</label>
              <input type="tel" id="phone" name="phone" required />
            </div>

            <div class="form-group">
              <label><i class="fa-solid fa-venus-mars"></i> Gender</label>
              <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>

            <div class="form-group">
              <label><i class="fa-solid fa-book"></i> Course</label>
              <select name="course" id="course" required>
                <option value="">Select Course</option>
                <option value="BCA">B.C.A</option>
                <option value="BSc IT">BSc IT</option>
                <option value="BBA">B.B.A</option>
              </select>
            </div>

            <div class="form-group">
              <label><i class="fa-solid fa-location-dot"></i> Address</label>
              <textarea
                id="address"
                name="address"
                rows="3"
                required
              ></textarea>
            </div>

            <div class="key-overlay" id="keyOverlay">
              <div class="key-modal">
                <h2>
                  <i class="fa-solid fa-shield-halved"></i> Security Check
                </h2>

                <div class="form-group">
                  <label for="authKey"
                    ><i class="fa-solid fa-key"></i> Admin Key</label
                  >
                  <input
                    type="password"
                    id="authKey"
                    placeholder="Enter key to proceed"
                  />
                </div>

                <p id="keyAlert" class="key-alert"></p>

                <div class="form-buttons">
                  <button type="button" id="verifyKeyBtn" class="btn">
                    <i class="fa-solid fa-unlock"></i> Verify & Submit
                  </button>
                  <button
                    type="button"
                    id="cancelKeyBtn"
                    class="btn secondary-btn"
                  >
                    <i class="fa-solid fa-xmark"></i> Cancel
                  </button>
                </div>
              </div>
            </div>

            <div class="form-buttons">
              <button class="btn">
                <i class="fa-solid fa-floppy-disk"></i> Save Student
              </button>
              <button type="reset" class="btn secondary-btn">
                <i class="fa-solid fa-rotate-right"></i> Reset
              </button>
              <span id="alert" style="color: red"></span>
            </div>
          </form>
        </div>
      </main>
    </div>
    <script src="js/global.js"></script>

    <script src="js/addSt.js"></script>
  </body>
</html>

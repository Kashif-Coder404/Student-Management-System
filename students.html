<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>View Students</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="container">
      <aside class="sidebar">
        <div class="aside-inner-cont">
          <ul>
            <li class="sideLink active" id="dashboard">
              <a href="index.html"
                ><i class="fa-solid fa-table-columns"></i> Dashboard</a
              >
            </li>
            <li class="sideLink" id="addStudent">
              <a href="addStudent.html"
                ><i class="fa-solid fa-user-plus"></i> Add Student</a
              >
            </li>
            <li class="sideLink" id="viewStudent">
              <a href="students.html"
                ><i class="fa-solid fa-users"></i> View Students</a
              >
            </li>
            <li class="sideLink" id="delStudent">
              <a href="delStudent.html"
                ><i class="fa-solid fa-trash-can"></i> Delete Students</a
              >
            </li>
          </ul>
        </div>
      </aside>
      <main class="main-content">
        <h1><i class="fa-solid fa-user-graduate"></i> Students</h1>

        <div class="top-actions">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or roll no"
          />

          <a href="addStudent.html" class="btn"
            ><i class="fa-solid fa-user-plus"></i> Add Student</a
          >
        </div>

        <div class="table-section">
          <table>
            <thead id="tH">
              <tr>
                <th><i class="fa-regular fa-user"></i> Name</th>
                <th><i class="fa-regular fa-id-card"></i> Roll No</th>
                <th><i class="fa-regular fa-envelope"></i> Email</th>
                <th><i class="fa-solid fa-book"></i> Course</th>
              </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="js/global.js"></script>

    <script src="js/viewSts.js"></script>
  </body>
</html>
